t="";const s=document.getElementById(i),a=()=>new Promise(e=>setTimeout(e,o)),r=()=>new Promise(e=>e()),c=()=>s.innerHTML=t.slice(0,e+1)+addText,l=document.createElement("span");for(l.id="blink",s.style.setProperty("--cursor-visibility","visible");e<t.length;){if(t.charAt(e+1)==="<"&&(n=!0),t.charAt(e+1)===">"&&(n=!1),n){e++;continue}requestAnimationFrame(c),o===0?await r():await a(),e++}s.style.setProperty("--cursor-visibility","collapse")}function parseDelay(t){const e=parseInt(t,10);return isNaN(e)?0:e}const titleDelay=parseDelay("0"),contentDelay=parseDelay("0"),typeeffetct=async()=>{await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c/h1\u003e\u003c/span\u003e","activity-title",titleDelay),await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch2 id=\u0022salesforce-platform-basics\u0022\u003eSalesforce Platform Basics\u003c/h2\u003e\n\u003cp\u003eLike any CRM, Salesforce stores your customer data, gives you processes to nurture prospective customers, and provides ways to collaborate with people you work with. Yet on top of that, it also comes with a lot of standard functionality, or out-of-the-box products and features that you can use to run your business.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\n\u003cp\u003eSell to prospects and customers\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLeads and Opportunities to manage sales\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eHelp customers after the sale\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCases and Communities for customer engagement\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eWork on the go\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eThe customizable Salesforce mobile app\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eCollaborate with coworkers, partners, and customers\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eChatter and Communities to connect your company\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eMarket to your audience\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eMarketing Cloud to manage your customer journeys\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eBy creating a single custom object, you can totally change how your organization collaborates. High impact, low effort. As you start building with the platform, keep your eye out for processes with:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eHeavy email collaboration\u003c/li\u003e\n\u003cli\u003eReliance on spreadsheets\u003c/li\u003e\n\u003cli\u003eShared local documents\u003c/li\u003e\n\u003cli\u003eTime-intensive, repetitive manual steps\u003c/li\u003e\n\u003cli\u003eImpact on only a few departments (you want to minimize the number of stakeholders while you’re still learning)\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003cp\u003eProcesses with these traits are great candidates for early projects on the Salesforce platform.\u003c/p\u003e\n\u003cp\u003eHR can utilize the platform, by building custom apps that can:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eList job openings.\u003c/li\u003e\n\u003cli\u003eStore applicants for each job opening.\u003c/li\u003e\n\u003cli\u003eSend automated reminders to hiring managers.\u003c/li\u003e\n\u003cli\u003eStore orientation and training plans.\u003c/li\u003e\n\u003cli\u003eManage equipment orders.\u003c/li\u003e\n\u003cli\u003eTrack employee time off.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIT using the Salesforce platform:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eCreate reports and dashboard to aggregate and analyze requests.\u003c/li\u003e\n\u003cli\u003eSend confirmation emails when requests are received, completed, or updated.\u003c/li\u003e\n\u003cli\u003eQueue incoming requests.\u003c/li\u003e\n\u003cli\u003eCreate custom forms for employee requests and create a knowledge base for common issues.\u003c/li\u003e\n\u003cli\u003eTrack employee hardware assets.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eOther Use Cases:\nFinance\n- Budget management\n- Contract management\n- Pricing\u003c/p\u003e\n\u003cp\u003eProduct\n- Warranty management\n-  Preproduction testing\n- Product ideas and innovation\u003c/p\u003e\n\u003cp\u003eSupply Chain\n- Procurement\n- Vendor management\n- Logistics\u003c/p\u003e\n\u003cp\u003eOps\n- Asset and facilities management\n- Merger and acquisition enablement\n- Business agility\u003c/p\u003e\n\u003chr\u003e\n\u003ch2 id=\u0022salesforce-architecture\u0022\u003eSalesforce Architecture\u003c/h2\u003e\n\u003cp\u003eSalesforce is a cloud company. Everything we offer resides in the trusted, multitenant cloud.\u003c/p\u003e\n\u003cp\u003eThe Salesforce platform is the foundation of our services. It’s powered by metadata and made up of different parts, like data services, artificial intelligence, and robust APIs for development.\u003c/p\u003e\n\u003cp\u003eAll our apps sit on top of the platform. Our prebuilt offerings like Sales Cloud and Marketing Cloud, along with apps you build using the platform, have consistent, powerful functionality.\u003c/p\u003e\n\u003cp\u003eEverything is integrated. Our platform technologies like predictive analytics and the development framework are built into everything we offer and everything you build.\u003c/p\u003e\n\n\n  \u003cimg src=\u0022https://res.cloudinary.com/hy4kyit2a/f_auto,fl_lossy,q_70/learn/modules/starting_force_com/starting_understanding_arch/images/a1b2bb1adfd5c5951a958fb019d4fbd2_platform-basics-arch.png\u0022 \n     width=\u0022100%\u0022 /\u003e\n\n\u003cp\u003eThere are few terms in here that are extra important for you to understand: \u003cstrong\u003etrust, multitenancy, metadata, and the API\u003c/strong\u003e.\u003c/p\u003e\n\u003ch2 id=\u0022setup-menu\u0022\u003eSetup Menu\u003c/h2\u003e\n\u003cp\u003eThere are three main categories in the Setup menu: \u003cstrong\u003eAdministration, Platform Tools, and Settings\u003c/strong\u003e.\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eCompany Information\n\u003cul\u003e\n\u003cli\u003eAt-a-glance view of your org\u003c/li\u003e\n\u003cli\u003eFind your org ID\u003c/li\u003e\n\u003cli\u003eSee your licensing information\u003c/li\u003e\n\u003cli\u003eMonitor important limits like data and file usage\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eUsers\n\u003cul\u003e\n\u003cli\u003eReset passwords\u003c/li\u003e\n\u003cli\u003eCreate new users and deactivate or freeze existing users\u003c/li\u003e\n\u003cli\u003eView information about your users\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eProfiles\n\u003cul\u003e\n\u003cli\u003eManage who can see what with user profiles\u003c/li\u003e\n\u003cli\u003eCreate custom profiles\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eView Setup Audit Trail\n\u003cul\u003e\n\u003cli\u003eSee 6 months of change history in your org\u003c/li\u003e\n\u003cli\u003eFind out who made changes and when\u003c/li\u003e\n\u003cli\u003eTool for troubleshooting org configuration issues\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eLogin History\n\u003cul\u003e\n\u003cli\u003eSee 6 months of login history for your org\u003c/li\u003e\n\u003cli\u003eView date, time, user, IP address, and more login data\u003c/li\u003e\n\u003cli\u003eUse for security tracking and adoption monitoring\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003e\u0026ldquo;Installed Packages\u0026rdquo;\u003c/strong\u003e contains apps that you\u0026rsquo;ve installed.\u003c/p\u003e\n\u003c/span\u003e","activity-content",contentDelay)};typeeffetct()</script></div><span class=navFull><span><a href=/>Home</a>
