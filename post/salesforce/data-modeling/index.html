<!doctype html><html lang=en-us><head><title></title><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=description content><style>@import "https://fonts.googleapis.com/css2?family=Inconsolata&display=swap";:root{--cursor-visibility:hidden}html,body{width:100%;height:100%;overflow:auto;font-family:inconsolata,monospace;font-size:4vmin;line-height:4.1vmin;font-weight:400}body{margin:0;display:flex;flex-direction:row;justify-content:center;align-items:center}#content{min-width:82vmin;min-height:82vmin}::-webkit-scrollbar{width:10px}::-webkit-scrollbar-track{border-radius:10px;box-shadow:inset 0 0 1px white}::-webkit-scrollbar-thumb{border-radius:10px;box-shadow:0 0 0 1px white}.cursor,#activity-title:after,#activity-content:after,#ps1_01:after,#cd:after,#ps1_02:after,#cat:after,#std_out_01:after,#ps1_03:after,#std_out_02:after,#ps1_04:after{visibility:var(--cursor-visibility);content:"|";overflow:hidden;color:#fff;animation:blink 500ms linear infinite alternate}@keyframes blink{0%{opacity:0}100%{opacity:1}}@media only screen and (min-width:768px){body{font-size:2.5vmin;line-height:2.6vmin}#content{min-width:60vmin}}:root{--cursor-visibility:hidden}body{align-items:unset;overflow-y:scroll}#content{max-width:80vmin}pre{overflow-x:scroll;white-space:pre}@keyframes blink{0%{opacity:0}100%{opacity:1}}body{background:#1b1d1e}body #terminal{color:#bbb}body #user{color:#23e298}body #dir{color:#d08010}body .Typewriter__cursor{color:#bbb}a{color:#bbb}.navFull{background-color:#353535;font-family:courier new;font-size:17px;display:inline;position:fixed;bottom:0;left:0;width:100%;padding-top:5px;padding:10px;padding-bottom:0}.navCredits{float:right;padding-right:18px;padding-bottom:10px;padding-top:5px}#content::after{content:"\a\a";white-space:pre}</style></head><body><div id=content><span id=activity-title></span><br><span id=activity-content></span><br><script type=text/javascript>async function typewriter(t,i,o){var e=0,n=!1;addText="";const s=document.getElementById(i),a=()=>new Promise(e=>setTimeout(e,o)),r=()=>new Promise(e=>e()),c=()=>s.innerHTML=t.slice(0,e+1)+addText,l=document.createElement("span");for(l.id="blink",s.style.setProperty("--cursor-visibility","visible");e<t.length;){if(t.charAt(e+1)==="<"&&(n=!0),t.charAt(e+1)===">"&&(n=!1),n){e++;continue}requestAnimationFrame(c),o===0?await r():await a(),e++}s.style.setProperty("--cursor-visibility","collapse")}function parseDelay(t){const e=parseInt(t,10);return isNaN(e)?0:e}const titleDelay=parseDelay("0"),contentDelay=parseDelay("0"),typeeffetct=async()=>{await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c/h1\u003e\u003c/span\u003e","activity-title",titleDelay),await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003cp\u003eA data model is a way to model what database tables look like in a way that makes sense to humans.\nIn Salesforce, we think about database tables as \u003cstrong\u003eobjects\u003c/strong\u003e, we think about columns as \u003cstrong\u003efields\u003c/strong\u003e, and rows as \u003cstrong\u003erecords\u003c/strong\u003e.\u003c/p\u003e\n\u003cp\u003eSalesforce supports several different types of objects. There are:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003estandard objects\u003c/li\u003e\n\u003cli\u003ecustom objects\u003c/li\u003e\n\u003cli\u003eexternal objects\u003c/li\u003e\n\u003cli\u003eplatform events\u003c/li\u003e\n\u003cli\u003eBigObjects\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch4 id=\u0022standard-objects\u0022\u003eStandard objects\u003c/h4\u003e\n\u003cp\u003eare objects that are included with Salesforce. Common business objects like Account, Contact, Lead, and Opportunity are all standard objects.\u003c/p\u003e\n\u003ch4 id=\u0022custom-objects\u0022\u003eCustom objects\u003c/h4\u003e\n\u003cp\u003eare objects that you create to store information that’s specific to your company or industry.\u003c/p\u003e\n\u003cp\u003eEvery standard and custom object has fields attached to it. Let’s get familiar with the different types of fields.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eIdentity\nA 15-character, case-sensitive field that’s automatically generated for every record. You can find a record’s ID in its URL. An account ID looks like 0015000000Gv7qJ.\u003c/li\u003e\n\u003cli\u003eSystem\nRead-only fields that provide information about a record from the system, like when the record was created or when it was last changed. CreatedDate, LastModifiedById, and LastModifiedDate.\u003c/li\u003e\n\u003cli\u003eName\nAll records need names so you can distinguish between them. You can use text names or auto-numbered names that automatically increment every time you create a record. A contact’s name can be Julie Bean. A support case’s name can be CA-1024.\u003c/li\u003e\n\u003cli\u003eCustom\nFields you create on standard or custom objects are called custom fields. You can create a custom field on the Contact object to store your contacts’ birthdays.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\u0022object-relationships\u0022\u003eObject relationships\u003c/h3\u003e\n\u003cp\u003eThere are two main types of object relationships: lookup and master-detail.\u003c/p\u003e\n\u003ch4 id=\u0022lookup\u0022\u003elookup\u003c/h4\u003e\n\u003cp\u003eA lookup relationship essentially links two objects together so that you can “look up” one object from the related items on another object. Typically, you use lookup relationships when objects are only related in some cases.\u003c/p\u003e\n\u003cp\u003eLookup relationships can be one-to-one or one-to-many.\u003c/p\u003e\n\u003ch4 id=\u0022master-detail\u0022\u003emaster-detail\u003c/h4\u003e\n\u003cp\u003eIn this type of relationship, one object is the master and another is the detail. The master object controls certain behaviors of the detail object, like who can view the detail’s data. In a master-detail relationship, the detail object doesn’t work as a stand-alone. It’s highly dependent on the master. In fact, if a record on the master object is deleted, all its related detail records are deleted as well. When you’re creating master-detail relationships, you always create the relationship field on the detail object.\u003c/p\u003e\n\u003ch4 id=\u0022hierarchical-relationship-extra\u0022\u003ehierarchical relationship (extra)\u003c/h4\u003e\n\u003cp\u003eHierarchical relationships are a special type of lookup relationship. The main difference between the two is that hierarchical relationships are only available on the User object. You can use them for things like creating management chains between users.\u003c/p\u003e\n\u003c/span\u003e","activity-content",contentDelay)};typeeffetct()</script></div><span class=navFull><span><a href=/>Home</a>
