\u003cp\u003eThe core values of Salesforce: Trust, Customer Success, Innovation, Equality, Sustainability.
Quote Kasparov :\u0026ldquo;A good human and a machine is the best combination.\u0026rdquo;\u003c/p\u003e
\u003ch3 id=\u0022types-of-bias\u0022\u003eTypes of Bias\u003c/h3\u003e
\u003ch4 id=\u0022measurement-or-dataset-bias\u0022\u003eMeasurement or Dataset Bias\u003c/h4\u003e
\u003cp\u003eCan be introduced when a person makes a mistake labeling the data or through machine error. A characteristic or factor can be over-or-underrepresented in your dataset.\u003c/p\u003e
\u003ch4 id=\u0022type-1-vs-type-2-error\u0022\u003eType 1 vs Type 2 Error\u003c/h4\u003e
\u003cp\u003eType 1 - false positive, predicts positive result but is actually negative;
Type 2 - false negative, predicts negative result but is actually positive;\u003c/p\u003e
\u003ch4 id=\u0022association-bias\u0022\u003eAssociation Bias\u003c/h4\u003e
\u003cp\u003eBias labels based on stereotypes, it results in association bias.\u003c/p\u003e
\u003ch4 id=\u0022confirmation-bias\u0022\u003eConfirmation Bias\u003c/h4\u003e
\u003cp\u003eBias labels based on preconceived ideas, such as recommendatoins reflecting your purchase habits.\u003c/p\u003e
\u003ch4 id=\u0022automation-bias\u0022\u003eAutomation Bias\u003c/h4\u003e
\u003cp\u003eIt imposes a system\u0026rsquo;s value on others due to the lack of variety and limits of the training data.\u003c/p\u003e
\u003ch4 id=\u0022societal-bias\u0022\u003eSocietal Bias\u003c/h4\u003e
\u003cp\u003ePrejudice toward historically marginalized groups.\u003c/p\u003e
\u003ch4 id=\u0022survival-bias\u0022\u003eSurvival Bias\u003c/h4\u003e
\u003cp\u003eAn algorithm focused on results that were selected or who survived a certain process at the expense of those who were excluded.\u003c/p\u003e
\u003ch4 id=\u0022interaction-bias\u0022\u003eInteraction Bias\u003c/h4\u003e
\u003cp\u003eHuman interaction with AI influencing the results it creates, such as teaching chatbots bad language.\u003c/p\u003e
\u003ch3 id=\u0022how-to-remove-bias\u0022\u003eHow to remove Bias\u003c/h3\u003e
\u003ch4 id=\u00221-conduct-premortems\u0022\u003e1. Conduct Premortems;\u003c/h4\u003e
\u003ch4 id=\u00222-identify-excluded-or-overrepresented-factors-in-your-dataset\u0022\u003e2. Identify Excluded or Overrepresented Factors in Your Dataset;\u003c/h4\u003e
\u003cp\u003eWhat: Statistical patterns that apply to majority may be invalid within a minority group;
How: Consider creating different algorithms for different groups rather than one size fits all.
What: People are excluded from your dataset, making it impossible to see the effects in the data;
How: Look for what researchers call unknown unknowns, errors that happen when a model is highly confident about a prediction that is actually wrong.\u003c/p\u003e
