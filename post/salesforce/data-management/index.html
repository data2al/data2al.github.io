\u003ch4 id=\u0022data-import-wizard\u0022\u003eData Import Wizard\u003c/h4\u003e
\u003cp\u003ethis tool, accessible through the Setup menu, lets you import data in common standard objects, such as contacts, leads, accounts, as well as data in custom objects. It can import up to \u003cstrong\u003e50,000 records\u003c/strong\u003e at a time. It provides a \u003cstrong\u003esimple interface\u003c/strong\u003e to specify the configuration parameters, data sources, and the field mappings that map the field names in your import file with the field names in Salesforce.\u003c/p\u003e
\u003cp\u003eUse the Data Import Wizard When:\u003c/p\u003e
\u003cul\u003e
\u003cli\u003eYou need to load less than 50,000 records.\u003c/li\u003e
\u003cli\u003eThe objects you need to import are supported by the wizard.\u003c/li\u003e
\u003cli\u003eYou don’t need the import process to be automated.\u003c/li\u003e
\u003c/ul\u003e
\u003ch4 id=\u0022data-loader\u0022\u003eData Loader\u003c/h4\u003e
\u003cp\u003ethis is a client application that can import up to \u003cstrong\u003efive million records\u003c/strong\u003e at a time, of any data type, either from files or a database connection. It can be operated either through the user interface or the command line. In the latter case, you need to specify data sources, field mappings, and other parameters via configuration files. This makes it possible to automate the import process, using API calls.\u003c/p\u003e
\u003cp\u003eUse Data Loader When:\u003c/p\u003e
\u003cul\u003e
\u003cli\u003eYou need to load 50,000 to five million records. If you need to load more than 5 million records, we recommend you work with a Salesforce partner or visit the AppExchange for a suitable partner product.\u003c/li\u003e
\u003cli\u003eYou need to load into an object that is not supported by the Data Import Wizard.\u003c/li\u003e
\u003cli\u003eYou want to schedule regular data loads, such as nightly imports.\u003c/li\u003e
\u003c/ul\u003e
\u003cp\u003eNote: Data Loader uses the \u003cstrong\u003eSOAP API\u003c/strong\u003e to process records. For faster processing, you can configure it to use the \u003cstrong\u003eBulk API\u003c/strong\u003e instead. The Bulk API is optimized to load a large number of records simultaneously. It is faster than the SOAP API due to parallel processing and fewer network round-trips.\u003c/p\u003e
\u003chr\u003e
\u003cp\u003e\u003cstrong\u003eSalesforce offers two main methods for exporting data.\u003c/strong\u003e\u003c/p\u003e
\u003ch4 id=\u0022data-export-service\u0022\u003eData Export Service\u003c/h4\u003e
\u003cp\u003ean in-browser service, accessible through the Setup menu. It allows you to export data manually once every 7 days (for weekly export) or 29 days (for monthly export). You can also export data automatically at weekly or monthly intervals. Weekly exports are available in Enterprise, Performance, and Unlimited Editions. In Professional Edition and Developer Edition, you can generate backup files only every 29 days, or automatically at monthly intervals only. The Schedule Export option allows you to schedule the export process for weekly or monthly intervals.\u003c/p\u003e
\u003ch4 id=\u0022data-loader-1\u0022\u003eData Loader\u003c/h4\u003e
\u003cp\u003ea client application that you must install separately. It can be operated either through the user interface or the command line. The latter option is useful if you want to automate the export process, or use APIs to integrate with another system.\u003c/p\u003e
