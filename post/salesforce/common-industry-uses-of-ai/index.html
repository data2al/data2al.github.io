<!doctype html><html lang=en-us><head><title></title><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=description content><style>@import "https://fonts.googleapis.com/css2?family=Inconsolata&display=swap";:root{--cursor-visibility:hidden}html,body{width:100%;height:100%;overflow:auto;font-family:inconsolata,monospace;font-size:4vmin;line-height:4.1vmin;font-weight:400}body{margin:0;display:flex;flex-direction:row;justify-content:center;align-items:center}#content{min-width:82vmin;min-height:82vmin}::-webkit-scrollbar{width:10px}::-webkit-scrollbar-track{border-radius:10px;box-shadow:inset 0 0 1px white}::-webkit-scrollbar-thumb{border-radius:10px;box-shadow:0 0 0 1px white}.cursor,#activity-title:after,#activity-content:after,#ps1_01:after,#cd:after,#ps1_02:after,#cat:after,#std_out_01:after,#ps1_03:after,#std_out_02:after,#ps1_04:after{visibility:var(--cursor-visibility);content:"|";overflow:hidden;color:#fff;animation:blink 500ms linear infinite alternate}@keyframes blink{0%{opacity:0}100%{opacity:1}}@media only screen and (min-width:768px){body{font-size:2.5vmin;line-height:2.6vmin}#content{min-width:60vmin}}:root{--cursor-visibility:hidden}body{align-items:unset;overflow-y:scroll}#content{max-width:80vmin}pre{overflow-x:scroll;white-space:pre}@keyframes blink{0%{opacity:0}100%{opacity:1}}body{background:#1b1d1e}body #terminal{color:#bbb}body #user{color:#23e298}body #dir{color:#d08010}body .Typewriter__cursor{color:#bbb}a{color:#bbb}.navFull{background-color:#353535;font-family:courier new;font-size:17px;display:inline;position:fixed;bottom:0;left:0;width:100%;padding-top:5px;padding:10px;padding-bottom:0}.navCredits{float:right;padding-right:18px;padding-bottom:10px;padding-top:5px}#content::after{content:"\a\a";white-space:pre}</style></head><body><div id=content><span id=activity-title></span><br><span id=activity-content></span><br><script type=text/javascript>async function typewriter(t,i,o){var e=0,n=!1;addText="";const s=document.getElementById(i),a=()=>new Promise(e=>setTimeout(e,o)),r=()=>new Promise(e=>e()),c=()=>s.innerHTML=t.slice(0,e+1)+addText,l=document.createElement("span");for(l.id="blink",s.style.setProperty("--cursor-visibility","visible");e<t.length;){if(t.charAt(e+1)==="<"&&(n=!0),t.charAt(e+1)===">"&&(n=!1),n){e++;continue}requestAnimationFrame(c),o===0?await r():await a(),e++}s.style.setProperty("--cursor-visibility","collapse")}function parseDelay(t){const e=parseInt(t,10);return isNaN(e)?0:e}const titleDelay=parseDelay("0"),contentDelay=parseDelay("0"),typeeffetct=async()=>{await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c/h1\u003e\u003c/span\u003e","activity-title",titleDelay),await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch2 id=\u0022common-industry-uses\u0022\u003eCommon Industry Uses\u003c/h2\u003e\n\u003ch3 id=\u0022marketing\u0022\u003eMarketing\u003c/h3\u003e\n\u003cp\u003eAI has a huge impact on email marketing. There\u0026rsquo;s a few questions that you can ask in regards to email:\u003cbr\u003e\n- Will your customers open the email\n- Will they click through it\n- Will they act on it\n- Will they unsub\nAll the questions above can be potentially predicted using Yes-and-No predictions. You can send emails to prospects who are likely to open them without ubsubing. In addition, you can also predict the right channel to use for every customer, such as push notifications instead of emails.\u003c/p\u003e\n\u003cp\u003eAnother thing to take note is \u0026ldquo;Send Time Optimization\u0026rdquo;. It helps predict the best time to send a communication for the highest response rate, specific to each person. You also want to know the right number of messages you should send in case customers get annoyed and unsub.\u003c/p\u003e\n\u003ch3 id=\u0022sales\u0022\u003eSales\u003c/h3\u003e\n\u003cp\u003eIn Sales, AI can be used to predict the best possible sales opportunities, by looking at KPI metrics such as CLV(lifetime value), CAC(acquisition cost) and CR(conversion rate). With a list of leads organized by how likely they\u0026rsquo;ll convert, will help reps avoid cold leads and saves them time.\u003c/p\u003e\n\u003cp\u003eA more advanced AI technique called NLP(Natural Language Processing) allows sales executives to pick out keywords from bundles of emails and shrink email content. Allowing executives to address the most relevant issues linked to sales.\u003c/p\u003e\n\u003cp\u003eAlgorithms such as k-nearest neighbours, and latent factor analysis are able to support collaborative filtering and help execs identify additional products to recommend based on buying patterns of similar customers.\u003c/p\u003e\n\u003cp\u003eEven Sales Managers can benefit from AI as predictive forecasting can help flag extreme mismatches in expected and actual revenue based on historical data.\u003c/p\u003e\n\u003ch3 id=\u0022customer-service\u0022\u003eCustomer Service\u003c/h3\u003e\n\u003cp\u003eAI can help customer service scan through complaint emails and classify them based on past inquiries. Rerouting to the correct person or department based on keywords and tags are also possible.\u003c/p\u003e\n\u003cp\u003eA more advanced product would be note scanning, when an agent is talking to a customer and taking notes, AI is able to scan those notes and recommend articles of solution.\u003c/p\u003e\n\u003cp\u003eChatbots are also built using AI, it is used to assist customers who are more comfortable trying to solve issues on their own.\u003c/p\u003e\n\u003ch3 id=\u0022retail-and-commerce\u0022\u003eRetail and Commerce\u003c/h3\u003e\n\u003cp\u003eHistoric data tells AIs which product bundles to recommend to customers and show them discounts so they are more inclined to buy. It can also personalize online store layout and search results to only include items the customers are interested in. Catering to what people are interested in is one of the strong suites of AI in retail.\u003c/p\u003e\n\u003c/span\u003e","activity-content",contentDelay)};typeeffetct()</script></div><span class=navFull><span><a href=/>Home</a>
