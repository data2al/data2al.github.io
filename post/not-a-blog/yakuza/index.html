t="";const s=document.getElementById(i),a=()=>new Promise(e=>setTimeout(e,o)),r=()=>new Promise(e=>e()),c=()=>s.innerHTML=t.slice(0,e+1)+addText,l=document.createElement("span");for(l.id="blink",s.style.setProperty("--cursor-visibility","visible");e<t.length;){if(t.charAt(e+1)==="<"&&(n=!0),t.charAt(e+1)===">"&&(n=!1),n){e++;continue}requestAnimationFrame(c),o===0?await r():await a(),e++}s.style.setProperty("--cursor-visibility","collapse")}function parseDelay(t){const e=parseInt(t,10);return isNaN(e)?0:e}const titleDelay=parseDelay("0"),contentDelay=parseDelay("0"),typeeffetct=async()=>{await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c/h1\u003e\u003c/span\u003e","activity-title",titleDelay),await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch3 id=\u0022good-police-and-yakuza-principles\u0022\u003eGood Police and Yakuza Principles\u003c/h3\u003e\n\u003cp\u003e4/11/2022\u003c/p\u003e\n\n\n  \u003cimg src=\u0022https://m.media-amazon.com/images/M/MV5BYWVhN2Q2MDEtMzIzYS00M2EwLTlmZDItMzk5YTUzZWE0MjkwXkEyXkFqcGdeQXVyMTEzMTI1Mjk3._V1_.jpg\u0022 \n     width=\u0022100%\u0022 /\u003e\n\n\u003cp\u003eI watched a couple episodes of \u0026ldquo;Tokyo Vice\u0026rdquo; and found that the book author that inspired the show, had some very good principles that he learned from both the Yakuza and the Police. I have listed those principles below and added comments explaining each one.\u003c/p\u003e\n\u003ch4 id=\u00221-learn-to-listen-well\u0022\u003e1. Learn to listen well.\u003c/h4\u003e\n\u003cp\u003eThe main difference between hearing and listening is that listening deals with understanding or perceiving the sound waves, which have an in-depth meaning. If you can\u0026rsquo;t hear the spaces and silences between someone\u0026rsquo;s words, then you\u0026rsquo;re not listening to them.\u003c/p\u003e\n\u003ch4 id=\u00222-honor-your-debts-and-have-a-code-of-honor\u0022\u003e2. Honor your debts and have a code of honor.\u003c/h4\u003e\n\u003cp\u003eWhen you pay your debts and follow your code, you\u0026rsquo;ll be able to live at peace with yourself.\u003c/p\u003e\n\u003ch4 id=\u00223-there-are-no-small-promises-as-a-mans-word-is-his-worth\u0022\u003e3. There are no small promises, as a man\u0026rsquo;s word is his worth.\u003c/h4\u003e\n\u003cp\u003eYou build trust by keeping promises, every time you call and you don\u0026rsquo;t call, you lose points in the other person\u0026rsquo;s eyes. If you do something that you promised, you gain trust. Eventually, when you keep your word long enough, people will trust you and tell you things. Promises are hard things to keep, you need to learn not to make promises lightly, and when you do make promises, you need to know the differences between the promises you didn\u0026rsquo;t keep and the promises you couldn\u0026rsquo;t keep. In this world, the measures of a man are the promises he\u0026rsquo;s made and the promises he\u0026rsquo;s kept.\u003c/p\u003e\n\u003ch4 id=\u00224-betray-others-and-you-betray-yourself\u0022\u003e4. Betray others and you betray yourself.\u003c/h4\u003e\n\u003cp\u003eIt\u0026rsquo;s okay to be betrayed, everyone gets betrayed in life. But you don\u0026rsquo;t want to be the one to betray your friend and don\u0026rsquo;t provide support. Because if you can\u0026rsquo;t be loyal to your friends, how can you expect them to be loyal to you? Once you betray someone, it sets up a circle of betrayal and in a sense, you are betraying yourself. In practice, this is a difficult principle to follow.\u003c/p\u003e\n\u003ch4 id=\u00225-a-man-with-no-enemies-is-worthless-dont-be-afraid-to-be-on-unfriendly-terms-with-people\u0022\u003e5. A man with no enemies is worthless, don\u0026rsquo;t be afraid to be on unfriendly terms with people.\u003c/h4\u003e\n\u003cp\u003eYou can tell a lot about a man from his enemies, and a man without enemies is no man at all. In some professions, people won\u0026rsquo;t like you. If you confront malicious people, those people will come after you.\u003c/p\u003e\n\u003ch4 id=\u00226-in-life-we-only-encounter-the-injustices-we-were-meant-to-correct\u0022\u003e6. In life, we only encounter the injustices we were meant to correct.\u003c/h4\u003e\n\u003cp\u003eThe world is a dangerous place not because of the people who are in it that are evil, but because of the people who see evil but do nothing about it. Note that correcting injustices can also come with the price of death.\u003c/p\u003e\n\u003ch4 id=\u00227-if-you-want-to-live-well-die-once-to-live-to-the-fullest\u0022\u003e7. If you want to live well, die once, to live to the fullest.\u003c/h4\u003e\n\u003cp\u003eIf you are going to live a life that is meaningful and heroic, you can\u0026rsquo;t be afraid of death. Be courageous and push the envelope forward bit by bit every day.\n \n \n \n \n \u003c/p\u003e\n\u003c/span\u003e","activity-content",contentDelay)};typeeffetct()</script></div><span class=navFull><span><a href=/>Home</a>
