\u0026ldquo;Diana sits at the dinner table, trying to contain her anger. She steals a raging glance at Charles, who stares back blankly with a sense of mild curiousness in his expression. He was waiting, waiting to see if she dared express her displeasure at a table where the Queen was also present. Diana slowly turned her gaze away. Looking across the table, she sees the ghost of Anne Boleyn, a figment of her imagination. She wonders if she\u0026rsquo;d be beheaded like her, who was put in a similar situation by King Henry VIII. As she pondered over the idea of death, the pearls around her neck started to tighten up. It felt like a noose\u0026hellip;\u0026rdquo;\u003c/p\u003e
\u003cp\u003e\u0026ldquo;Spencer\u0026rdquo; is a film that showcases an re-imagined version of Princess Diana\u0026rsquo;s Christmas dinner with the royal family. Whether she confronted her husband about his infidelity during this time is largely unknown.The film outlines the heartache and complexities of romantic relationships nurtured under the shade of the Royal Family. As Royals do enjoy a great many luxuries, they are also chained by tradition and public opinion which prevents them from freely expressing themselves.
