\u003cp\u003e\u0026ldquo;As I woke at the Site of Lost Grace, I looked across the half-abandoned battlefield in the barren valley below me. I could see Knights and Soldiers strolling through the area. Their stiff movements betray their state of fatigue.\u003c/p\u003e
\u003cp\u003eLike a madman, I charged into the nearest group of soldiers, hoping to eliminate any early threats before crossing the field. Halberd in one hand, Sacred Seal in the other, I circled the group and rounded up my prey, strafing and poking, trying to thin out the herd. The soldiers fought back valiantly, yet their attacks fell short as I rolled and dodged out of harm\u0026rsquo;s way. As another group of Soldiers closed in, I waved the seal I was holding, and a burst of flame errupted from my hands, engulfing them, melting armor and burning flesh. Without looking back, I ran quickly into the valley, fearing more enemies would come\u0026hellip;\u0026rdquo;\u003c/p\u003e
\u003cp\u003eSuch was the experience of \u0026lsquo;Elden Ring\u0026rsquo;, a game designed to challenge its players with complex terrain and interesting battles. In \u0026lsquo;Elden Ring\u0026rsquo;, you start out as a lowly Tarnished, an exiled member of the Round Table that once served the Queen. Your mission is to roam the \u0026lsquo;Lands In-Between\u0026rsquo; and uncover your findings about the all-powerful Elden Ring. The \u0026lsquo;Lands In-Between\u0026rsquo; is a beautiful island, filled with castles and towers that belonged to various nobelity. Monsters are the player\u0026rsquo;s least concern, as fearsome Dragons soar through the skies while skilled horsemen gallop over the grasslands. A heavily guarded mages\u0026rsquo; academy stands firmly on top of a tall rock, located in the middle of a misty lake. A mysterious stone Manor sits on the edge of a volcano, marred by hot flames, yet filled with maze-like dungeons and chilling secrets.\u003c/p\u003e
\u003cp\u003eFor those of you who wish to learn more, \u0026ldquo;KiteTales \u0026amp; Flex\u0026rdquo; has a youtube series explaining the lore of \u0026lsquo;Elden Ring\u0026rsquo;. I highly recommend it.\u003c/p\u003e
