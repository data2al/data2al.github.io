t="";const s=document.getElementById(i),a=()=>new Promise(e=>setTimeout(e,o)),r=()=>new Promise(e=>e()),c=()=>s.innerHTML=t.slice(0,e+1)+addText,l=document.createElement("span");for(l.id="blink",s.style.setProperty("--cursor-visibility","visible");e<t.length;){if(t.charAt(e+1)==="<"&&(n=!0),t.charAt(e+1)===">"&&(n=!1),n){e++;continue}requestAnimationFrame(c),o===0?await r():await a(),e++}s.style.setProperty("--cursor-visibility","collapse")}function parseDelay(t){const e=parseInt(t,10);return isNaN(e)?0:e}const titleDelay=parseDelay("0"),contentDelay=parseDelay("0"),typeeffetct=async()=>{await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch1 id=\u0027title\u0027\u003e\u003c/h1\u003e\u003c/span\u003e","activity-title",titleDelay),await typewriter("\u003cspan id=\u0027terminal\u0027\u003e\u003ch4 id=\u0022elden-ring---battle-on-the-altus-plateau\u0022\u003e\u0026lsquo;Elden Ring\u0026rsquo; - Battle on the Altus Plateau\u003c/h4\u003e\n\u003cp\u003e04/??/2022\u003c/p\u003e\n\n\n  \u003cimg src=\u0022https://github.com/data2al/media_files/blob/main/elden-ring.png?raw=true\u0022 \n     width=\u0022100%\u0022 /\u003e\n\n\u003cp\u003e\u0026ldquo;As I woke up at the Site of Lost Grace, I peeked across the half-abandoned battlefield in the hill valleys below me. I could see the Knights and Soldiers of the Golden Order patrolling the area. Their slow movements betray their ill-state of fatigue.\u003c/p\u003e\n\u003cp\u003eLike a madman, I charged into the nearest group of soldiers, hoping to eliminate any early threats before crossing the battlefield. Halberd in one hand, Sacred Seal in the other, I circled the group like a wolf rounding up its prey. I strafed, poked, and prodded, trying to thin out the herd of men in front of me. The soldiers fought back valiantly, charging at me, swords drawn, spears ready, yet their attacks fell short as I rolled and dodged out of harm\u0026rsquo;s way with ease. As another group of Soldiers closed in, I waved the seal that I was holding in my hand, and a burst of flame consumed the Soldiers, melting armor and burning flesh. I watched in glee as the men in front of me screamed in agony.\u003c/p\u003e\n\u003cp\u003eSuddenly, a fierce blow struck me on my helmet, sending my entire body flying through the air. I rolled over and quickly looked up, only to see the outline of a towering knight standing over me, the next second his sword pierced my chest and I collapsed into nothingness. I wake up at the Site of Lost Grace again\u0026hellip;\u0026rdquo;\u003c/p\u003e\n\u003cp\u003eSuch was the experience of \u0026lsquo;Elden Ring\u0026rsquo;, a game designed to challenge its players with complex terrain and impossible battles. In \u0026lsquo;Elden Ring\u0026rsquo;, you start as a lowly Tarnished, an exiled member of the Round Table that once served the Queen Marika of the \u0026lsquo;Lands In-Between\u0026rsquo;. You roam the lands and piece together clues in hopes of saving them. The \u0026lsquo;Lands In-Between\u0026rsquo; is an expansive location, filled with castles and towers that belonged to various lords and nobility. Dragons roam the skies while horse lords gallop over the grasslands. A mages academy stands firmly on the top of a tall rock in the middle of a lake, its bridges blocked with barricades and guarded by Soldiers. The infamous Volcano manor shows an area where the battle had already ceded, leaving you to figure out who was fighting whom and why they had fought.\u003c/p\u003e\n\u003cp\u003eFor those of you who wish to learn more, \u0026ldquo;KiteTales \u0026amp; Flex\u0026rdquo; has made a series of detailed lore videos about \u0026lsquo;Elden Ring\u0026rsquo;. I highly recommend.\u003c/p\u003e\n\n\n\u003ca href=\u0022https://youtu.be/ohn81IXW-6k\u0022\u003e\n  \u003cimg src=\u0022https://github.com/data2al/media_files/blob/main/youtube.png?raw=true\u0022 \n     width=\u0022100%\u0022 /\u003e\n\u003c/a\u003e\n\n\u003c/span\u003e","activity-content",contentDelay)};typeeffetct()<
