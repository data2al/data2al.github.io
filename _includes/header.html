<header id="top">
    <div class="wrapper">
        <a href="{{ site.baseurl }}/" class="brand">
            <img class="brand-icon" src="{{ "/favicon.ico" | prepend: site.baseurl }}" alt="{{ site.title }} icon">
            <span class="brand-copy">
                <strong>{{ site.title }}</strong>
                <small>{{ site.brief-intro }}</small>
            </span>
        </a>
        <div class="header-search" id="headerSearch">
            <label class="search-label" for="siteSearch">Search articles</label>
            <input
                id="siteSearch"
                class="search-input"
                type="search"
                placeholder="Search articles..."
                autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>
        <button id="headerMenu" class="menu"><i class="fa fa-bars"></i></button>
        <nav id="headerNav">
            <ul>
                <li>
                    {% if page.url == '/' %}
                    <a class="active" href="{{site.baseurl}}/">
                        {% else %}
                    <a href="{{site.baseurl}}/">
                    {% endif %}
                        <i class="fa fa-home"></i>Directory
                    </a>
                </li>
                <li>
                    {% if page.url == '/about/' %}
                    <a class="active" href="{{site.baseurl}}/about/">
                    {% else %}
                    <a href="{{site.baseurl}}/about/">
                    {% endif %}
                        <i class="fa fa-user-o"></i>About
                    </a>
                </li>
                <li>
                    {% if page.url == '/scribbles/' %}
                    <a class="active" href="{{site.baseurl}}/scribbles/">
                    {% else %}
                    <a href="{{site.baseurl}}/scribbles/">
                    {% endif %}
                        <i class="fa fa-pencil"></i>Scribbles
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</header>
