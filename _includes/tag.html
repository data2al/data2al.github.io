{% if post %}
  {% assign tag_source = post.tags %}
{% else %}
  {% assign tag_source = page.tags %}
{% endif %}
{% if tag_source and tag_source.size > 0 %}
<span class="pageTag">
  <i class="fa fa-tags"></i>
  {% for tag in tag_source %}
    <span class="meta-chip">{{ tag }}</span>{% unless forloop.last %} {% endunless %}
  {% endfor %}
</span>
{% endif %}
